<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Route Simulation</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body {
      height: 100%; margin: 0; font-family: Arial, sans-serif;
    }
    #map { height: 100%; width: 100%; }
    .controls {
      position: absolute; top: 10px; left: 10px;
      background: white; padding: 10px;
      border-radius: 8px; z-index: 1000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .warning, .direction-box {
      position: absolute; left: 50%; transform: translateX(-50%);
      padding: 10px 20px; border-radius: 10px; font-size: 16px;
      z-index: 9999; animation: fadeIn 1s ease-in-out;
    }
    .warning {
      top: 20px; background: rgba(255, 0, 0, 0.8);
      color: white; display: none;
    }
    .direction-box {
      bottom: 40px; background: rgba(0, 0, 255, 0.8);
      color: white; display: none;
    }
    .completion-box {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background-color: #28a745; color: white; padding: 20px 30px;
      border-radius: 10px; font-size: 20px; display: none; z-index: 10000;
      animation: fadeIn 1s ease-in-out;
    }
    .travel-tip-box {
      position: absolute; right: 10px; top: 10px;
      background: rgba(255, 165, 0, 0.85);
      padding: 10px; border-radius: 8px; color: white;
      font-weight: bold; display: none; z-index: 9999;
    }
    .eta-box {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0, 0, 0, 0.7); color: white;
      padding: 10px; border-radius: 8px;
      z-index: 1000; font-weight: bold;
    }
    .progress-container {
      position: absolute; bottom: 0; left: 0;
      width: 100%; height: 10px;
      background: rgba(0, 0, 0, 0.1); z-index: 9999;
    }
    .progress-bar {
      height: 100%; width: 0%; background: #28a745;
      transition: width 0.5s;
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>Source:</label>
    <select id="source">
      <option value="0">Maisammaguda</option>
      <option value="1">Shapur Nagar</option>
      <option value="2">Charminar</option>
      <option value="3">Secunderabad</option>
    </select><br><br>
    <label>Destination:</label>
    <select id="destination">
      <option value="1">Shapur Nagar</option>
      <option value="2">Charminar</option>
      <option value="3">Secunderabad</option>
      <option value="4">Maisammaguda</option>
    </select><br><br>
    <label>Mode:</label>
    <select id="mode">
      <option value="🚗">Driver</option>
      <option value="🚶">Walker</option>
    </select><br><br>
    <button onclick="startJourney()">Start Trip</button>
  </div>

  <div id="map"></div>
  <div class="warning" id="warningBox"></div>
  <div class="direction-box" id="directionBox"></div>
  <div class="completion-box" id="completionBox">🎉 Reached your destination! Hope you travelled safely with Way-ther 😊🛣️☔</div>
  <div class="travel-tip-box" id="travelTipBox"></div>
  <div class="eta-box" id="etaBox">⏳ ETA: -- min | 📏 Distance: -- km</div>
  <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([17.385, 78.486], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    const locations = {
      0: [17.540, 78.385], 1: [17.500, 78.460],
      2: [17.3616, 78.4747], 3: [17.4399, 78.4983],
      4: [17.540, 78.385]
    };

    const paths = {
      '0-1': [locations[0], [17.520, 78.420], [17.510, 78.440], locations[1]],
      '0-2': [locations[0], [17.450, 78.420], [17.400, 78.450], locations[2]],
      '0-3': [locations[0], [17.480, 78.450], [17.460, 78.470], locations[3]],
      '1-2': [locations[1], [17.420, 78.460], [17.390, 78.470], locations[2]],
      '1-3': [locations[1], [17.460, 78.470], locations[3]],
      '2-3': [locations[2], [17.400, 78.480], locations[3]],
      '3-4': [locations[3], [17.500, 78.430], locations[4]]
    };

    const directions = [
      "🔄 Move right in 200m", "⬆️ Continue straight for 500m",
      "⬅️ Turn left after the signal", "↗️ Take the slight right",
      "🔄 Roundabout ahead, take 2nd exit"
    ];

    const weatherData = [
      { lat: 17.450, lng: 78.420, message: "⚠️ Light rain ahead in 10 minutes. Carry an umbrella." },
      { lat: 17.480, lng: 78.450, message: "⛈️ Heavy rain expected near Banjara Hills. Wear a raincoat." },
      { lat: 17.390, lng: 78.470, message: "🌧️ Rain on the way near Mehdipatnam. Take precautions." },
      { lat: 17.520, lng: 78.420, message: "🌂 Mild showers expected soon. Carry an umbrella." }
    ];

    let polyline, marker, interval, currentIndex = 0, currentRoute = [];

    function speak(message) {
      return new Promise(resolve => {
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.onend = resolve;
        speechSynthesis.speak(utterance);
      });
    }

    function showWarning(message) {
      const box = document.getElementById('warningBox');
      box.textContent = message;
      box.style.display = 'block';
      speak(message);
      setTimeout(() => box.style.display = 'none', 6000);
    }

    function showDirection(message) {
      const box = document.getElementById('directionBox');
      box.textContent = message;
      box.style.display = 'block';
      speak(message);
      setTimeout(() => box.style.display = 'none', 5000);
    }

    function showTravelTip(mode) {
      const box = document.getElementById('travelTipBox');
      let tip = mode === '🚶'
        ? "Tip for walkers: Carry an umbrella if it’s raining."
        : "Tip for drivers: Visibility is low, turn on headlights.";
      box.textContent = tip;
      box.style.display = 'block';
      speak(tip);
      setTimeout(() => box.style.display = 'none', 5000);
    }

    function updateProgressBar(current, total) {
      const progress = ((current + 1) / total) * 100;
      document.getElementById('progressBar').style.width = progress + '%';
    }

    function getDistanceInKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    function calculateDistanceAndETA(route, mode) {
      let total = 0;
      for (let i = 0; i < route.length - 1; i++) {
        total += getDistanceInKm(route[i][0], route[i][1], route[i + 1][0], route[i + 1][1]);
      }
      const speed = mode === '🚶' ? 5 : 40;
      const eta = (total / speed) * 60;
      document.getElementById('etaBox').innerHTML = `⏳ ETA: ${eta.toFixed(1)} min | 📏 Distance: ${total.toFixed(2)} km`;
    }

    async function startJourney() {
      const source = document.getElementById('source').value;
      const destination = document.getElementById('destination').value;
      const mode = document.getElementById('mode').value;

      document.getElementById('completionBox').style.display = 'none';

      const key = `${source}-${destination}`;
      currentRoute = paths[key] || [];
      calculateDistanceAndETA(currentRoute, mode);

      if (polyline) map.removeLayer(polyline);
      if (marker) map.removeLayer(marker);

      polyline = L.polyline(currentRoute, { color: 'blue' }).addTo(map);
      map.fitBounds(polyline.getBounds());

      currentIndex = 0;
      marker = L.marker(currentRoute[currentIndex], {
        icon: L.divIcon({ className: 'custom-div-icon', html: `<div style="font-size:24px">${mode}</div>` })
      }).addTo(map);

      clearInterval(interval);
      interval = setInterval(async () => {
        if (currentIndex >= currentRoute.length) {
          clearInterval(interval);
          document.getElementById('completionBox').style.display = 'block';
          await speak("You have reached your destination. Thank you for traveling safely with Way-ther.");
          updateProgressBar(currentRoute.length, currentRoute.length);
          return;
        }

        const [lat, lng] = currentRoute[currentIndex];
        marker.setLatLng([lat, lng]);
        map.panTo([lat, lng]);
        polyline.setLatLngs(currentRoute.slice(currentIndex));

        if (currentIndex % 2 === 0) {
          const dir = directions[Math.floor(Math.random() * directions.length)];
          showDirection(dir);
          showTravelTip(mode);
        }

        weatherData.forEach(w => {
          const dist = Math.sqrt(Math.pow(w.lat - lat, 2) + Math.pow(w.lng - lng, 2));
          if (dist < 0.01) showWarning(w.message);
        });

        updateProgressBar(currentIndex, currentRoute.length);
        currentIndex++;
      }, 6000);
    }
  </script>
</body>
</html>
